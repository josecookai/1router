openapi: 3.1.0
info:
  title: 1Router MVP API
  version: 0.1.0
  description: Minimal contract for MVP routing and policy/key management workflows.
servers:
  - url: http://localhost:3000
paths:
  /v1/models:
    get:
      summary: List available unified models
      operationId: listModels
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"
              example:
                data:
                  - id: openai/gpt-4.1-mini
                    provider: openai
                    capabilities:
                      - chat
                      - tool_calls
                  - id: anthropic/claude-3-5-sonnet
                    provider: anthropic
                    capabilities:
                      - chat
                meta:
                  request_id: req_models_001
  /v1/embeddings:
    post:
      summary: Create embeddings (stub)
      operationId: createEmbeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingsRequest"
            example:
              model: openai/text-embedding-3-small
              input:
                - hello
                - world
      responses:
        "200":
          description: Embeddings created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsResponse"
              example:
                object: list
                data:
                  - object: embedding
                    embedding: [0.532, 0.05, 0.804124]
                    index: 0
                  - object: embedding
                    embedding: [0.552, 0.05, 0.845361]
                    index: 1
                model: openai/text-embedding-3-small
                usage:
                  prompt_tokens: 3
                  total_tokens: 3
                x_router:
                  provider: openai
                  stub: true
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/keys:
    post:
      summary: Create provider API key (returns plaintext once)
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
            example:
              provider: openai
              label: prod-openai
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
    get:
      summary: List configured provider keys
      operationId: listApiKeys
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeysListResponse"
              example:
                data:
                  - id: key_01
                    provider: openai
                    label: prod-openai
                    last4: sk12
                    status: active
                  - id: key_02
                    provider: anthropic
                    label: staging-anthropic
                    last4: abcd
                    status: inactive
                meta:
                  request_id: req_keys_001
  /api/policies:
    get:
      summary: List routing policies
      operationId: listPolicies
      responses:
        "200":
          description: Policies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoliciesListResponse"
              example:
                data:
                  - id: pol_01
                    name: default-chat
                    match:
                      route: /v1/chat/completions
                    action:
                      strategy: failover
                      providers:
                        - openai
                        - anthropic
                  - id: pol_02
                    name: low-cost-embeddings
                    match:
                      route: /v1/embeddings
                    action:
                      strategy: priority
                      providers:
                        - openai
                meta:
                  request_id: req_policies_001
components:
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required: [request_id]
      properties:
        request_id:
          type: string
    Model:
      type: object
      additionalProperties: false
      required: [id, provider, capabilities]
      properties:
        id:
          type: string
        provider:
          type: string
        capabilities:
          type: array
          items:
            type: string
    ModelsListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"
        meta:
          $ref: "#/components/schemas/Meta"
    EmbeddingsRequest:
      type: object
      additionalProperties: false
      required: [model, input]
      properties:
        model:
          type: string
          minLength: 1
        input:
          oneOf:
            - type: string
              minLength: 1
            - type: array
              minItems: 1
              items:
                type: string
                minLength: 1
    EmbeddingRow:
      type: object
      additionalProperties: false
      required: [object, embedding, index]
      properties:
        object:
          type: string
          enum: [embedding]
        embedding:
          type: array
          items:
            type: number
        index:
          type: integer
          minimum: 0
    EmbeddingsUsage:
      type: object
      additionalProperties: false
      required: [prompt_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    EmbeddingsRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, stub]
      properties:
        provider:
          type: string
        stub:
          type: boolean
          enum: [true]
    EmbeddingsResponse:
      type: object
      additionalProperties: false
      required: [object, data, model, usage, x_router]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingRow"
        model:
          type: string
        usage:
          $ref: "#/components/schemas/EmbeddingsUsage"
        x_router:
          $ref: "#/components/schemas/EmbeddingsRouterMeta"
    EmbeddingsError:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: true
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum: [INVALID_REQUEST, UNSUPPORTED_MODEL]
            message:
              type: string
            request_id:
              type: string
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      required: [provider, label]
      properties:
        provider:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
    ApiKeyMetadata:
      type: object
      additionalProperties: false
      required: [id, provider, label, last4, status]
      properties:
        id:
          type: string
        provider:
          type: string
        label:
          type: string
        last4:
          type: string
        status:
          type: string
          enum: [active, inactive]
    ApiKeyRecord:
      allOf:
        - $ref: "#/components/schemas/ApiKeyMetadata"
    CreatedApiKey:
      type: object
      additionalProperties: false
      required: [id, provider, label, key, key_prefix, last4, status]
      properties:
        id:
          type: string
        provider:
          type: string
        label:
          type: string
        key:
          type: string
        key_prefix:
          type: string
        last4:
          type: string
        status:
          type: string
          enum: [active, inactive]
    ApiKeysListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyMetadata"
        meta:
          $ref: "#/components/schemas/Meta"
    CreateApiKeyResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/CreatedApiKey"
        meta:
          $ref: "#/components/schemas/Meta"
    PolicyMatch:
      type: object
      additionalProperties: false
      required: [route]
      properties:
        route:
          type: string
    PolicyAction:
      type: object
      additionalProperties: false
      required: [strategy, providers]
      properties:
        strategy:
          type: string
          enum: [priority, failover]
        providers:
          type: array
          items:
            type: string
    PolicyRecord:
      type: object
      additionalProperties: false
      required: [id, name, match, action]
      properties:
        id:
          type: string
        name:
          type: string
        match:
          $ref: "#/components/schemas/PolicyMatch"
        action:
          $ref: "#/components/schemas/PolicyAction"
    PoliciesListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRecord"
        meta:
          $ref: "#/components/schemas/Meta"
