openapi: 3.1.0
info:
  title: 1Router MVP API
  version: 0.1.0
  description: Minimal contract for MVP routing and policy/key management workflows.
servers:
  - url: http://localhost:3000
paths:
  /v1/models:
    get:
      summary: List available unified models
      operationId: listModels
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"
              example:
                data:
                  - id: openai/gpt-4.1-mini
                    provider: openai
                    capabilities:
                      - chat
                      - tool_calls
                  - id: anthropic/claude-3-5-sonnet
                    provider: anthropic
                    capabilities:
                      - chat
                meta:
                  request_id: req_models_001
  /v1/embeddings:
    post:
      summary: Create embeddings (stub)
      operationId: createEmbeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingsRequest"
            example:
              model: openai/text-embedding-3-small
              input:
                - hello
                - world
      responses:
        "200":
          description: Embeddings created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsResponse"
              example:
                object: list
                data:
                  - object: embedding
                    embedding: [0.532, 0.05, 0.804124]
                    index: 0
                  - object: embedding
                    embedding: [0.552, 0.05, 0.845361]
                    index: 1
                model: openai/text-embedding-3-small
                usage:
                  prompt_tokens: 3
                  total_tokens: 3
                x_router:
                  provider: openai
                  stub: true
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /v1/chat/completions:
    post:
      summary: Create chat completion (supports streaming stub)
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
            example:
              model: openai/gpt-4.1-mini
              messages:
                - role: user
                  content: Say hi
              stream: false
              temperature: 0.7
      responses:
        "200":
          description: Chat completion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionsResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /v1/responses:
    post:
      summary: Create response (non-streaming stub)
      operationId: createResponse
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
            example:
              model: openai/gpt-4.1-mini
              input: Say hi
              stream: false
      responses:
        "200":
          description: Response created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /v1/routing/decision/explain:
    post:
      summary: Explain routing decision factors (non-streaming)
      operationId: explainRoutingDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoutingExplainRequest"
            example:
              model: router/auto
              routing_preset: success
              region_preference: EU
      responses:
        "200":
          description: Routing decision trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingExplainResponse"
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/orgs/{orgId}/usage:
    get:
      summary: Read aggregated usage for an org
      operationId: getOrgUsage
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: group_by
          required: false
          schema:
            type: string
            enum: [hour, model]
      responses:
        "200":
          description: Usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUsageResponse"
              example:
                data:
                  org_id: org_demo
                  from: "2026-02-26T10:00:00.000Z"
                  to: "2026-02-26T12:00:00.000Z"
                  group_by: hour
                  provisional: false
                  finalized_at: "2026-02-26T12:00:00.000Z"
                  totals:
                    bucket: total
                    requests: 28
                    input_tokens: 4200
                    output_tokens: 1600
                    total_tokens: 5800
                    cost_usd: 0.231
                    platform_fee_usd: 0.0231
                    provisional: true
                    finalized_at: null
                  summary:
                    provisional: true
                    finalized_at: null
                    totals:
                      bucket: total
                      requests: 28
                      input_tokens: 4200
                      output_tokens: 1600
                      total_tokens: 5800
                      cost_usd: 0.231
                      platform_fee_usd: 0.0231
                      provisional: true
                      finalized_at: null
                  buckets:
                    - bucket: "2026-02-26T10:00:00.000Z"
                      requests: 13
                      input_tokens: 1900
                      output_tokens: 700
                      total_tokens: 2600
                      cost_usd: 0.102
                      platform_fee_usd: 0.0102
                      provisional: true
                      finalized_at: null
                    - bucket: "2026-02-26T11:00:00.000Z"
                      requests: 15
                      input_tokens: 2300
                      output_tokens: 900
                      total_tokens: 3200
                      cost_usd: 0.129
                      platform_fee_usd: 0.0129
                      provisional: false
                      finalized_at: "2026-02-26T12:00:00.000Z"
                meta:
                  request_id: req_usage_001
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/orgs/{orgId}/invoice:
    get:
      summary: Read monthly invoice line items for an org
      operationId: getOrgInvoice
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
        - in: query
          name: month
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
      responses:
        "200":
          description: Monthly invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgInvoiceResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/keys:
    post:
      summary: Create provider API key (returns plaintext once)
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
            example:
              provider: openai
              label: prod-openai
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
    get:
      summary: List configured provider keys
      operationId: listApiKeys
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeysListResponse"
              example:
                data:
                  - id: key_01
                    provider: openai
                    label: prod-openai
                    last4: sk12
                    status: active
                  - id: key_02
                    provider: anthropic
                    label: staging-anthropic
                    last4: abcd
                    status: inactive
                meta:
                  request_id: req_keys_001
  /api/orgs:
    get:
      summary: List organizations (MVP control-plane)
      operationId: listOrgs
      responses:
        "200":
          description: Organizations list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgsListResponse"
              example:
                data:
                  - id: org_01
                    name: Acme Inc
                    status: active
                    created_at: "2026-01-01T00:00:00.000Z"
                    updated_at: "2026-01-01T00:00:00.000Z"
                meta:
                  request_id: req_orgs_001
    post:
      summary: Create organization (MVP)
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
            example:
              name: Acme Inc
              status: active
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/orgs/{orgId}:
    patch:
      summary: Update organization (MVP)
      operationId: updateOrg
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgRequest"
            example:
              status: inactive
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/projects:
    get:
      summary: List projects (MVP control-plane)
      operationId: listProjects
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsListResponse"
              example:
                data:
                  - id: prj_01
                    org_id: org_01
                    name: Acme Default
                    status: active
                    created_at: "2026-01-01T00:00:00.000Z"
                    updated_at: "2026-01-01T00:00:00.000Z"
                meta:
                  request_id: req_projects_001
    post:
      summary: Create project (MVP)
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              org_id: org_01
              name: Acme Default
              status: active
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/projects/{projectId}:
    patch:
      summary: Update project (MVP)
      operationId: updateProject
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
            example:
              name: Acme Default v2
              status: inactive
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/models:
    get:
      summary: List control-plane models for policy UI
      operationId: listControlPlaneModels
      parameters:
        - in: query
          name: provider
          required: false
          schema:
            type: string
            enum: [openai, anthropic, google]
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [active, inactive]
      responses:
        "200":
          description: Control-plane models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"
              example:
                data:
                  - id: openai/gpt-4.1-mini
                    provider: openai
                    status: active
                    capabilities: [tools, vision, json_schema]
                  - id: anthropic/claude-3-5-sonnet
                    provider: anthropic
                    status: active
                    capabilities: [tools, vision]
                meta:
                  request_id: req_cp_models_001
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/policies:
    get:
      summary: List routing policies
      operationId: listPolicies
      responses:
        "200":
          description: Policies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoliciesListResponse"
              example:
                data:
                  - id: pol_01
                    name: default-chat
                    route: /v1/chat/completions
                    status: active
                    weights:
                      - provider: openai
                        value: 0.7
                      - provider: anthropic
                        value: 0.3
                    fallback_chain:
                      - anthropic
                      - openai
                    constraints:
                      max_latency_ms: 3000
                    created_at: "2026-01-01T00:00:00.000Z"
                meta:
                  request_id: req_policies_001
    post:
      summary: Create routing policy (in-memory MVP)
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
            example:
              name: ui-policy
              route: /v1/chat/completions
              status: active
              weights:
                - provider: openai
                  value: 0.8
                - provider: anthropic
                  value: 0.2
              fallback_chain:
                - anthropic
              constraints:
                max_latency_ms: 2500
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/infra/slo:
    get:
      summary: Get aggregated provider SLI snapshot for incident dashboard
      operationId: getInfraSliSnapshot
      parameters:
        - in: query
          name: window_minutes
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1440
        - in: query
          name: service
          required: false
          schema:
            type: string
        - in: query
          name: env
          required: false
          schema:
            type: string
            enum: [dev, staging, prod]
        - in: query
          name: route_group
          required: false
          schema:
            type: string
        - in: query
          name: method
          required: false
          schema:
            type: string
      responses:
        "200":
          description: SLI snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SliDashboardResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/infra/traces:
    get:
      summary: List route decision traces for request debugging
      operationId: listInfraTraces
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: route_group
          required: false
          schema:
            type: string
        - in: query
          name: provider
          required: false
          schema:
            type: string
        - in: query
          name: redact
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Trace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceListResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/webhooks/payments:
    post:
      summary: Receive payment/invoice provider webhook with idempotency
      operationId: receivePaymentWebhook
      parameters:
        - in: header
          name: x-provider-event-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentWebhookRequest"
            example:
              provider: stripe
              event_type: payment.succeeded
              org_id: org_demo
              invoice_id: inv_2026_02
              payment_id: pay_123
              amount_cents: 275
              currency: USD
              occurred_at: "2026-02-27T12:00:00.000Z"
      responses:
        "200":
          description: Payment webhook accepted or replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentWebhookAck"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
        "409":
          description: Event id conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
components:
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required: [request_id]
      properties:
        request_id:
          type: string
    SliAggregate:
      type: object
      additionalProperties: false
      required: [window_minutes, request_count, success_rate, error_rate, p95_latency_ms]
      properties:
        window_minutes:
          type: integer
          minimum: 1
        request_count:
          type: integer
          minimum: 0
        success_rate:
          type: number
          minimum: 0
          maximum: 1
        error_rate:
          type: number
          minimum: 0
          maximum: 1
        p95_latency_ms:
          type: integer
          minimum: 0
    SliDashboardResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/SliAggregate"
        meta:
          $ref: "#/components/schemas/Meta"
    TraceItem:
      type: object
      additionalProperties: false
      required: [request_id, ts, route_group, provider, provider_model, model, status, latency_ms, prompt_preview]
      properties:
        request_id:
          type: string
        ts:
          type: string
          format: date-time
        route_group:
          type: string
        provider:
          type: string
        provider_model:
          type: string
        model:
          type: string
        status:
          type: integer
        latency_ms:
          type: integer
          minimum: 0
        prompt_preview:
          type: string
    TraceListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TraceItem"
        meta:
          $ref: "#/components/schemas/Meta"
    Model:
      type: object
      additionalProperties: false
      required: [id, provider, status, capabilities]
      properties:
        id:
          type: string
        provider:
          type: string
        status:
          type: string
          enum: [active, inactive]
        capabilities:
          type: array
          items:
            type: string
    ModelsListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"
        meta:
          $ref: "#/components/schemas/Meta"
    EmbeddingsRequest:
      type: object
      additionalProperties: false
      required: [model, input]
      properties:
        model:
          type: string
          minLength: 1
        input:
          oneOf:
            - type: string
              minLength: 1
            - type: array
              minItems: 1
              items:
                type: string
                minLength: 1
    EmbeddingRow:
      type: object
      additionalProperties: false
      required: [object, embedding, index]
      properties:
        object:
          type: string
          enum: [embedding]
        embedding:
          type: array
          items:
            type: number
        index:
          type: integer
          minimum: 0
    EmbeddingsUsage:
      type: object
      additionalProperties: false
      required: [prompt_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    EmbeddingsRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, stub]
      properties:
        provider:
          type: string
        stub:
          type: boolean
          enum: [true]
    EmbeddingsResponse:
      type: object
      additionalProperties: false
      required: [object, data, model, usage, x_router]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingRow"
        model:
          type: string
        usage:
          $ref: "#/components/schemas/EmbeddingsUsage"
        x_router:
          $ref: "#/components/schemas/EmbeddingsRouterMeta"
    EmbeddingsError:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: true
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum: [INVALID_REQUEST, UNSUPPORTED_MODEL, IDEMPOTENCY_KEY_CONFLICT]
            message:
              type: string
            request_id:
              type: string
    ChatMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
          minLength: 1
    ChatCompletionsRequest:
      type: object
      additionalProperties: false
      required: [model, messages]
      properties:
        model:
          type: string
          minLength: 1
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        max_tokens:
          type: integer
          minimum: 1
    ChatCompletionChoice:
      type: object
      additionalProperties: false
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: object
          additionalProperties: false
          required: [role, content]
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
        finish_reason:
          type: string
          enum: [stop]
    ChatCompletionUsage:
      type: object
      additionalProperties: false
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        completion_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    ChatCompletionRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, provider_model, request_id]
      properties:
        provider:
          type: string
        provider_model:
          type: string
        request_id:
          type: string
    ChatCompletionsResponse:
      type: object
      additionalProperties: false
      required: [id, object, created, model, choices, usage, router]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          minimum: 0
        model:
          type: string
        choices:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        usage:
          $ref: "#/components/schemas/ChatCompletionUsage"
        router:
          $ref: "#/components/schemas/ChatCompletionRouterMeta"
