openapi: 3.1.0
info:
  title: 1Router MVP API
  version: 0.1.0
  description: Minimal contract for MVP routing and policy/key management workflows.
servers:
  - url: http://localhost:3000
paths:
  /v1/models:
    get:
      summary: List available unified models
      operationId: listModels
      responses:
        "200":
          description: Models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"
              example:
                data:
                  - id: openai/gpt-4.1-mini
                    provider: openai
                    capabilities:
                      - chat
                      - tool_calls
                  - id: anthropic/claude-3-5-sonnet
                    provider: anthropic
                    capabilities:
                      - chat
                meta:
                  request_id: req_models_001
  /v1/embeddings:
    post:
      summary: Create embeddings (stub)
      operationId: createEmbeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingsRequest"
            example:
              model: openai/text-embedding-3-small
              input:
                - hello
                - world
      responses:
        "200":
          description: Embeddings created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsResponse"
              example:
                object: list
                data:
                  - object: embedding
                    embedding: [0.532, 0.05, 0.804124]
                    index: 0
                  - object: embedding
                    embedding: [0.552, 0.05, 0.845361]
                    index: 1
                model: openai/text-embedding-3-small
                usage:
                  prompt_tokens: 3
                  total_tokens: 3
                x_router:
                  provider: openai
                  stub: true
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /v1/chat/completions:
    post:
      summary: Create chat completion (non-streaming stub)
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
            example:
              model: openai/gpt-4.1-mini
              messages:
                - role: user
                  content: Say hi
              stream: false
              temperature: 0.7
      responses:
        "200":
          description: Chat completion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionsResponse"
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /v1/responses:
    post:
      summary: Create response (non-streaming stub)
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponsesRequest"
            example:
              model: openai/gpt-4.1-mini
              input: Say hi
              stream: false
      responses:
        "200":
          description: Response created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponsesResponse"
        "400":
          description: Invalid request or unsupported model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/orgs/{orgId}/usage:
    get:
      summary: Read aggregated usage for an org
      operationId: getOrgUsage
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: group_by
          required: false
          schema:
            type: string
            enum: [hour, model]
      responses:
        "200":
          description: Usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUsageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
  /api/keys:
    post:
      summary: Create provider API key (returns plaintext once)
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
            example:
              provider: openai
              label: prod-openai
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
    get:
      summary: List configured provider keys
      operationId: listApiKeys
      responses:
        "200":
          description: API keys list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeysListResponse"
              example:
                data:
                  - id: key_01
                    provider: openai
                    label: prod-openai
                    last4: sk12
                    status: active
                  - id: key_02
                    provider: anthropic
                    label: staging-anthropic
                    last4: abcd
                    status: inactive
                meta:
                  request_id: req_keys_001
  /api/models:
    get:
      summary: List control-plane models for policy UI
      operationId: listControlPlaneModels
      responses:
        "200":
          description: Control-plane models list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelsListResponse"
              example:
                data:
                  - id: openai/gpt-4.1-mini
                    provider: openai
                    capabilities: [tools, vision, json_schema]
                  - id: anthropic/claude-3-5-sonnet
                    provider: anthropic
                    capabilities: [tools, vision]
                meta:
                  request_id: req_cp_models_001
  /api/policies:
    get:
      summary: List routing policies
      operationId: listPolicies
      responses:
        "200":
          description: Policies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoliciesListResponse"
              example:
                data:
                  - id: pol_01
                    name: default-chat
                    route: /v1/chat/completions
                    status: active
                    weights:
                      - provider: openai
                        value: 0.7
                      - provider: anthropic
                        value: 0.3
                    fallback_chain:
                      - anthropic
                      - openai
                    constraints:
                      max_latency_ms: 3000
                    created_at: "2026-01-01T00:00:00.000Z"
                meta:
                  request_id: req_policies_001
    post:
      summary: Create routing policy (in-memory MVP)
      operationId: createPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyRequest"
            example:
              name: ui-policy
              route: /v1/chat/completions
              status: active
              weights:
                - provider: openai
                  value: 0.8
                - provider: anthropic
                  value: 0.2
              fallback_chain:
                - anthropic
              constraints:
                max_latency_ms: 2500
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyRecordResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingsError"
components:
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required: [request_id]
      properties:
        request_id:
          type: string
    Model:
      type: object
      additionalProperties: false
      required: [id, provider, capabilities]
      properties:
        id:
          type: string
        provider:
          type: string
        capabilities:
          type: array
          items:
            type: string
    ModelsListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Model"
        meta:
          $ref: "#/components/schemas/Meta"
    EmbeddingsRequest:
      type: object
      additionalProperties: false
      required: [model, input]
      properties:
        model:
          type: string
          minLength: 1
        input:
          oneOf:
            - type: string
              minLength: 1
            - type: array
              minItems: 1
              items:
                type: string
                minLength: 1
    EmbeddingRow:
      type: object
      additionalProperties: false
      required: [object, embedding, index]
      properties:
        object:
          type: string
          enum: [embedding]
        embedding:
          type: array
          items:
            type: number
        index:
          type: integer
          minimum: 0
    EmbeddingsUsage:
      type: object
      additionalProperties: false
      required: [prompt_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    EmbeddingsRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, stub]
      properties:
        provider:
          type: string
        stub:
          type: boolean
          enum: [true]
    EmbeddingsResponse:
      type: object
      additionalProperties: false
      required: [object, data, model, usage, x_router]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingRow"
        model:
          type: string
        usage:
          $ref: "#/components/schemas/EmbeddingsUsage"
        x_router:
          $ref: "#/components/schemas/EmbeddingsRouterMeta"
    EmbeddingsError:
      type: object
      additionalProperties: true
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: true
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum: [INVALID_REQUEST, UNSUPPORTED_MODEL]
            message:
              type: string
            request_id:
              type: string
    ChatMessage:
      type: object
      additionalProperties: false
      required: [role, content]
      properties:
        role:
          type: string
          enum: [system, user, assistant]
        content:
          type: string
          minLength: 1
    ChatCompletionsRequest:
      type: object
      additionalProperties: false
      required: [model, messages]
      properties:
        model:
          type: string
          minLength: 1
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatMessage"
        stream:
          type: boolean
          enum: [false]
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        max_tokens:
          type: integer
          minimum: 1
    ChatCompletionChoice:
      type: object
      additionalProperties: false
      required: [index, message, finish_reason]
      properties:
        index:
          type: integer
          minimum: 0
        message:
          type: object
          additionalProperties: false
          required: [role, content]
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
        finish_reason:
          type: string
          enum: [stop]
    ChatCompletionUsage:
      type: object
      additionalProperties: false
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        completion_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    ChatCompletionRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, provider_model, request_id]
      properties:
        provider:
          type: string
        provider_model:
          type: string
        request_id:
          type: string
    ChatCompletionsResponse:
      type: object
      additionalProperties: false
      required: [id, object, created, model, choices, usage, router]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          minimum: 0
        model:
          type: string
        choices:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ChatCompletionChoice"
        usage:
          $ref: "#/components/schemas/ChatCompletionUsage"
        router:
          $ref: "#/components/schemas/ChatCompletionRouterMeta"
    ResponsesRequest:
      type: object
      additionalProperties: false
      required: [model, input]
      properties:
        model:
          type: string
          minLength: 1
        input:
          type: string
          minLength: 1
        stream:
          type: boolean
          enum: [false]
        temperature:
          type: number
          minimum: 0
          maximum: 2
        max_output_tokens:
          type: integer
          minimum: 1
    ResponsesOutputText:
      type: object
      additionalProperties: false
      required: [type, text]
      properties:
        type:
          type: string
          enum: [output_text]
        text:
          type: string
    ResponsesOutputMessage:
      type: object
      additionalProperties: false
      required: [type, role, content]
      properties:
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ResponsesOutputText"
    ResponsesUsage:
      type: object
      additionalProperties: false
      required: [input_tokens, output_tokens, total_tokens]
      properties:
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    ResponsesRouterMeta:
      type: object
      additionalProperties: false
      required: [provider, provider_model, request_id]
      properties:
        provider:
          type: string
        provider_model:
          type: string
        request_id:
          type: string
    ResponsesResponse:
      type: object
      additionalProperties: false
      required: [id, object, created, model, output, usage, router]
      properties:
        id:
          type: string
        object:
          type: string
          enum: [response]
        created:
          type: integer
          minimum: 0
        model:
          type: string
        output:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ResponsesOutputMessage"
        usage:
          $ref: "#/components/schemas/ResponsesUsage"
        router:
          $ref: "#/components/schemas/ResponsesRouterMeta"
    UsageBucket:
      type: object
      additionalProperties: false
      required: [bucket, requests, input_tokens, output_tokens, total_tokens, cost_usd, platform_fee_usd]
      properties:
        bucket:
          type: string
        requests:
          type: integer
          minimum: 0
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        cost_usd:
          type: number
          minimum: 0
        platform_fee_usd:
          type: number
          minimum: 0
    OrgUsageData:
      type: object
      additionalProperties: false
      required: [org_id, from, to, group_by, provisional, finalized_at, totals, buckets]
      properties:
        org_id:
          type: string
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        group_by:
          type: string
          enum: [hour, model]
        provisional:
          type: boolean
        finalized_at:
          type: string
          format: date-time
          nullable: true
        totals:
          $ref: "#/components/schemas/UsageBucket"
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/UsageBucket"
    OrgUsageResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/OrgUsageData"
        meta:
          $ref: "#/components/schemas/Meta"
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      required: [provider, label]
      properties:
        provider:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
    ApiKeyMetadata:
      type: object
      additionalProperties: false
      required: [id, provider, label, last4, status]
      properties:
        id:
          type: string
        provider:
          type: string
        label:
          type: string
        last4:
          type: string
        status:
          type: string
          enum: [active, inactive]
    ApiKeyRecord:
      allOf:
        - $ref: "#/components/schemas/ApiKeyMetadata"
    CreatedApiKey:
      type: object
      additionalProperties: false
      required: [id, provider, label, key, key_prefix, last4, status]
      properties:
        id:
          type: string
        provider:
          type: string
        label:
          type: string
        key:
          type: string
        key_prefix:
          type: string
        last4:
          type: string
        status:
          type: string
          enum: [active, inactive]
    ApiKeysListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyMetadata"
        meta:
          $ref: "#/components/schemas/Meta"
    CreateApiKeyResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/CreatedApiKey"
        meta:
          $ref: "#/components/schemas/Meta"
    PolicyWeight:
      type: object
      additionalProperties: false
      required: [provider, value]
      properties:
        provider:
          type: string
        value:
          type: number
          exclusiveMinimum: 0
    PolicyConstraints:
      type: object
      additionalProperties: false
      properties:
        max_latency_ms:
          type: integer
          minimum: 1
        region:
          type: string
      minProperties: 1
    CreatePolicyRequest:
      type: object
      additionalProperties: false
      required: [name, route, weights]
      properties:
        name:
          type: string
          minLength: 1
        route:
          type: string
          minLength: 1
        status:
          type: string
          enum: [active, inactive]
          default: active
        weights:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PolicyWeight"
        fallback_chain:
          type: array
          items:
            type: string
            minLength: 1
        constraints:
          $ref: "#/components/schemas/PolicyConstraints"
    PolicyRecord:
      type: object
      additionalProperties: false
      required: [id, name, route, status, weights, fallback_chain, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        route:
          type: string
        status:
          type: string
          enum: [active, inactive]
        weights:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PolicyWeight"
        fallback_chain:
          type: array
          items:
            type: string
        constraints:
          $ref: "#/components/schemas/PolicyConstraints"
        created_at:
          type: string
          format: date-time
    PoliciesListResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PolicyRecord"
        meta:
          $ref: "#/components/schemas/Meta"
    PolicyRecordResponse:
      type: object
      additionalProperties: false
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PolicyRecord"
        meta:
          $ref: "#/components/schemas/Meta"
